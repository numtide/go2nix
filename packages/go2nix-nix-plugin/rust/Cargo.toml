[package]
name = "go2nix-nix-plugin"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Go package resolver for Nix — runs go list and returns the dependency graph as JSON"

[lib]
name = "go2nix_nix_plugin"
crate-type = ["staticlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
sha2 = "0.10"
base64 = "0.22"
tempfile = "3"
